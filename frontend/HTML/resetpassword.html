<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resetpassword_Bib</title>
    <link rel="stylesheet" href="../CSS/auth.css">
    <style>
        input{
            font-family: 'Roboto', sans-serif;
            margin-left:200px;
        }
        input[type="submit"]{
            font-size:12px;
        }
    </style>
</head>
<body>
    <div class="struct">
        <i class="fa-solid fa-store"></i>
        <h1>Boutique UIYA - Gestion de Stock</h1>
    </div>

    <div class="container">
        <form id="formResetPassword" method="POST">
            <h1>Réinitialisation du mot de passe</h1>
            
            <div id="messageErreur" style="display:none; color: #e74c3c; text-align: center; margin-bottom: 15px; padding: 10px; background-color: #fadbd8; border-radius: 5px;"></div>
            
            <div class="detail-user">
                <div class="colonne">
                    <div class="zone-saisie">
                        <input 
                            type="email" 
                            id="email" 
                            name="email_user" 
                            placeholder="Adresse e-mail" 
                            required
                            autocomplete="email">
                    </div>
                </div>
            </div>

            <div id="messageSucces" style="display:none; color: #155724; text-align: center; margin-bottom: 15px; padding: 10px; background-color: #d4edda; border-radius: 5px;"></div>

            <input 
                id="btnSubmit" 
                type="submit" 
                value="Envoyer le lien de réinitialisation">
        </form>
    </div>

    <script>
        document.getElementById('formResetPassword').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const btnSubmit = document.getElementById('btnSubmit');
            const msgErreur = document.getElementById('messageErreur');
            const msgSucces = document.getElementById('messageSucces');
            
            if (!email) {
                msgErreur.style.display = 'block';
                msgErreur.textContent = 'Veuillez entrer votre email.';
                return;
            }
            
            // Masquer les messages
            msgErreur.style.display = 'none';
            msgSucces.style.display = 'none';
            
            try {
                btnSubmit.disabled = true;
                btnSubmit.value = 'Envoi en cours...';
                
                const response = await fetch('/APP_IB/backend/Api/Auth/reset-password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });
                
                const responseText = await response.text();
                let data = {};
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    console.error('Erreur parsing JSON:', responseText);
                    msgErreur.textContent = 'Réponse serveur invalide.';
                    msgErreur.style.display = 'block';
                    return;
                }
                
                if (data.success) {
                    msgSucces.textContent = data.message || 'Un lien de réinitialisation a été envoyé à votre adresse email.';
                    msgSucces.style.display = 'block';
                    document.getElementById('email').value = '';
                } else {
                    msgErreur.textContent = data.message || 'Erreur lors de la demande.';
                    msgErreur.style.display = 'block';
                }
            } catch (error) {
                console.error('Erreur:', error);
                msgErreur.textContent = 'Une erreur est survenue. Veuillez réessayer.';
                msgErreur.style.display = 'block';
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.value = 'Envoyer le lien de réinitialisation';
            }
        });
    </script>
</body>
</html>
